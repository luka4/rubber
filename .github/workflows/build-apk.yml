name: Build Android APK

# This triggers the action whenever you push code to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK using EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x # Standard stable version for React Native/Expo

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }} # We will set this up in Step 3

      - name: Install dependencies
        run: npm install

      - name: Build APK
        # This uses the "preview" profile from our eas.json to generate an .apk
        run: eas build --platform android --profile preview --non-interactive